<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Happy Path Studios</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f8f2e8;
      color: #0c1420;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .rule {
      width: 2.5rem;
      height: 1px;
      background: #b8882a;
      margin: 0 auto 1.5rem;
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #b8882a;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #0c1420;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: #4a3f34;
      margin-bottom: 2rem;
    }

    .home-link {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      background: #478c5c;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 2px;
      transition: background 0.2s ease;
    }

    .home-link:hover { background: #2c5a3a; }

    .footer-note {
      margin-top: 3rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4a3f34;
      opacity: 0.45;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rule" aria-hidden="true"></div>
    <p class="eyebrow">Happy Path Studios</p>
    <h1>404</h1>
    <p>The page you're looking for isn't here. It may have moved, or the URL may be incorrect.</p>
    <a class="home-link" href="/">Return to Home</a>
    <p class="footer-note">Leesburg, Florida &nbsp;·&nbsp; 352-290-7744</p>
  </div>
</body>
</html>
